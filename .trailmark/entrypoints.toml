# lib-tacit entrypoint declarations.
# Tacit is a pure library (no network I/O, no DOM), so entrypoints are
# the cryptographic function exports that wallet/dapp/indexer consumers
# call. Entrypoints are classified by trust level and asset value.
# See trailofbits/trailmark docs/entrypoint-patterns.md for the full ref.

# === Crypto primitives — exposed to untrusted data via wire decode ===
[[entrypoint]]
node = "crypto.pedersen:tryBytesToPoint"
kind = "user_input"
trust = "untrusted_external"
asset_value = "high"
description = "Parses untrusted 33-byte secp256k1 points from envelope decode"

[[entrypoint]]
node = "envelope.script:decodeEnvelopeScript"
kind = "user_input"
trust = "untrusted_external"
asset_value = "high"
description = "Deserializes taproot script witness; top-level wire parser"

[[entrypoint]]
node = "indexer.ipfs:ipfsFetchVerified"
kind = "third_party"
trust = "untrusted_external"
asset_value = "medium"
description = "Fetches untrusted IPFS data via gateway; CID-verified"

[[entrypoint]]
node = "indexer.ipfs:verifyCidV1"
kind = "user_input"
trust = "untrusted_external"
asset_value = "medium"
description = "Validates CID format from external input"

