[[entrypoint]]
node = "crypto.kernel:verifyKernel"
kind = "user_input"
trust = "untrusted_external"
asset_value = "high"
description = "Verifies kernel signature against excess point; supply-conservation gate"

[[entrypoint]]
node = "crypto.schnorr:verifySchnorr"
